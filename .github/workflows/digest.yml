name: news digest

on:
  schedule:
    # 13:00 UTC = 09:00 ET / 06:00 PT. Adjust if you want a different delivery time.
    - cron: "0 13 * * *"
  workflow_dispatch:
    inputs:
      topic:
        description: "Run only this topic (leave empty for all due topics)"
        required: false
      dry_run:
        description: "Print payload only, don't post"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: news-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          # Pick the extras matching your llm.provider in config.yaml
          # (gemini | anthropic | openai | groq | all)
          pip install -e ".[${{ vars.LLM_EXTRA || 'gemini' }}]"

      - name: Run digest
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          NCBI_EMAIL: ${{ secrets.NCBI_EMAIL }}
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
          UNPAYWALL_EMAIL: ${{ secrets.UNPAYWALL_EMAIL || secrets.NCBI_EMAIL }}
        run: |
          ARGS=""
          if [ -n "${{ inputs.topic }}" ]; then
            ARGS="$ARGS --topic ${{ inputs.topic }}"
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python -m news_webhook.run $ARGS -v

      - name: Commit seen.json
        if: ${{ inputs.dry_run != 'true' }}
        run: |
          if [ -n "$(git status --porcelain state/seen.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state/seen.json
            git commit -m "chore(state): update seen articles [skip ci]"
            git push
          else
            echo "No state changes to commit."
          fi
